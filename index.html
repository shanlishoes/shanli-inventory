<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>انبارگردانی شانلی</title>

<meta name="theme-color" content="#1976d2">

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="loading">

<div class="loader"></div>

<p>در حال بارگذاری...</p>

</div>

<div id="app" style="display:none;">

<header>

<h1>📦 انبارگردانی شانلی</h1>

</header>

<section id="loginPage" class="card">

<h2>شروع انبارگردانی</h2>

<input
id="user"
type="text"
placeholder="نام انباردار">

<input
id="supervisor"
type="text"
placeholder="نام ناظر">

<select id="branch">

<option value="انبار مرکزی">
انبار مرکزی
</option>

<option value="ارومیه">
ارومیه
</option>

<option value="شوط">
شوط
</option>

</select>

<button id="startBtn">

شروع انبارگردانی

</button>

</section>

<section
id="scanPage"
class="card"
style="display:none;">

<div class="topBar">

<div>

<strong id="userLabel"></strong>

<br>

<small id="branchLabel"></small>

</div>

<div class="counter">

<span>

ثبت شده

</span>

<h2 id="itemCount">

0

</h2>

</div>

</div>

<div
id="cameraBox">

<div id="reader"></div>

</div>
<div class="qtyArea">

<label>

تعداد

</label>

<div class="qtyBox">

<button
id="minus"
type="button">

−

</button>

<input
id="qty"
type="number"
value="1"
min="1"
readonly>

<button
id="plus"
type="button">

+

</button>

</div>

</div>

<div class="barcodeArea">

<input
id="barcode"
type="text"
inputmode="numeric"
autocomplete="off"
placeholder="بارکد را اسکن یا وارد کنید">

</div>

<div class="actionButtons">

<button
id="scanBtn"
class="primary">

✅ ثبت

</button>

<button
id="finishBtn"
class="danger">

🏁 پایان انبارگردانی

</button>

</div>

<div
id="result"
class="result">

آماده اسکن...

</div>

<div class="stats">

<div class="stat">

<span>

بارکدهای یکتا

</span>

<h3 id="uniqueItems">

0

</h3>

</div>

<div class="stat">

<span>

جمع تعداد

</span>

<h3 id="totalQty">

0

</h3>

</div>

</div>

</section>
</div>

<script src="zxing-browser.min.js"></script>
<script src="api.js"></script>
<script src="script.js"></script>

<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", function () {

navigator.serviceWorker.register("sw.js")
.catch(function(e){

console.log(e);

});

});

}

</script>

</body>

</html>
